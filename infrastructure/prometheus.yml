global:
  scrape_interval: 15s # How frequently to scrape targets by default.
  evaluation_interval: 15s # How frequently to evaluate rules.

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    # The default endpoint exposed by the Jenkins Prometheus Plugin
    metrics_path: '/prometheus/'
    # Replace 'host.docker.internal:8080' with your actual Jenkins server IP and port
    # 'host.docker.internal' is used to reach the host machine from inside the docker container
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'charity_backend'
    static_configs:
      - targets: ['backend:5000']
